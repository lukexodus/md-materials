
<svg width="100%" viewBox="0 0 680 300">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Root S -->
  <g class="c-purple">
    <rect x="290" y="20" width="100" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">S</text>
  </g>

  <!-- S → S + S: left S, +, right S -->
  <!-- Left S at x=130 -->
  <g class="c-purple">
    <rect x="80" y="100" width="100" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="118" text-anchor="middle" dominant-baseline="central">S</text>
  </g>
  <!-- + terminal -->
  <g class="c-teal">
    <rect x="290" y="100" width="100" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central">+</text>
  </g>
  <!-- Right S at x=500 -->
  <g class="c-purple">
    <rect x="450" y="100" width="100" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="118" text-anchor="middle" dominant-baseline="central">S</text>
  </g>

  <!-- Left S → a -->
  <g class="c-coral">
    <rect x="80" y="190" width="100" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="130" y="208" text-anchor="middle" dominant-baseline="central">a</text>
  </g>

  <!-- Right S → S * S -->
  <g class="c-purple">
    <rect x="370" y="190" width="80" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="410" y="208" text-anchor="middle" dominant-baseline="central">S</text>
  </g>
  <g class="c-teal">
    <rect x="460" y="190" width="80" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="208" text-anchor="middle" dominant-baseline="central">*</text>
  </g>
  <g class="c-purple">
    <rect x="550" y="190" width="80" height="36" rx="8" stroke-width="0.5"/>
    <text class="th" x="590" y="208" text-anchor="middle" dominant-baseline="central">S</text>
  </g>

  <!-- Leaf a values for right subtree -->
  <g class="c-coral">
    <rect x="370" y="262" width="80" height="28" rx="8" stroke-width="0.5"/>
    <text class="th" x="410" y="276" text-anchor="middle" dominant-baseline="central">a</text>
  </g>
  <g class="c-coral">
    <rect x="550" y="262" width="80" height="28" rx="8" stroke-width="0.5"/>
    <text class="th" x="590" y="276" text-anchor="middle" dominant-baseline="central">a</text>
  </g>

  <!-- Edges from root S -->
  <line x1="315" y1="56" x2="175" y2="100" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="56" x2="340" y2="100" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>
  <line x1="365" y1="56" x2="505" y2="100" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>

  <!-- Edge left S → a -->
  <line x1="130" y1="136" x2="130" y2="190" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>

  <!-- Edges right S → S * S -->
  <line x1="480" y1="136" x2="430" y2="190" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>
  <line x1="500" y1="136" x2="500" y2="190" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>
  <line x1="520" y1="136" x2="570" y2="190" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>

  <!-- Edges S → a (leaves) -->
  <line x1="410" y1="226" x2="410" y2="262" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>
  <line x1="590" y1="226" x2="590" y2="262" stroke="var(--t)" stroke-width="0.8" opacity="0.5"/>

  <!-- Caption -->
  <text class="ts" x="340" y="292" text-anchor="middle" opacity="0.6">Tree 1 — yield: a + (a * a)  — addition groups at root</text>
</svg>
